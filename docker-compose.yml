version: "3.9"

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16  # PostgreSQL 16 with pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: knowledge_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledge-os

  # FastAPI application
  app-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/knowledge_os
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SQL_ECHO: "false"
      WORKER_ID: api
    volumes:
      - ./workspace:/workspace  # Mount workspace for file access
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - knowledge-os

  # Background job worker
  worker-runtime:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/knowledge_os
      LOG_FORMAT: ${LOG_FORMAT:-json}
      WORKER_ID: ${WORKER_ID:-worker-1}
    volumes:
      - ./workspace:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'src.worker.main' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - knowledge-os

  # Caddy reverse proxy with auto-HTTPS
  caddy:
    image: caddy:3-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # For HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./workspace:/workspace:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app-api:
        condition: service_healthy
    networks:
      - knowledge-os

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  knowledge-os:
    driver: bridge
